<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Card Generator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Business Card Generator</h1>
    </header>
    <main id="app">
        <section id="editor">
            <h2>Card Editor</h2>
            
            <div class="control-group">
                <h3>Orientation</h3>
                <div class="btn-group">
                    <button id="btn-landscape" class="active">Landscape</button>
                    <button id="btn-portrait">Portrait</button>
                </div>
            </div>

            <div class="control-group">
                <h3>Template</h3>
                <select id="template-select">
                    <option value="minimal">Minimalist Professional</option>
                    <option value="modern">Modern Creative</option>
                    <option value="elegant">Classic Elegant</option>
                </select>
            </div>

            <div class="control-group">
                <h3>Contact Information</h3>
                <div class="input-group">
                    <label for="input-name">Full Name</label>
                    <input type="text" id="input-name" placeholder="e.g. John Doe" value="John Doe">
                </div>
                <div class="input-group">
                    <label for="input-title">Professional Title</label>
                    <input type="text" id="input-title" placeholder="e.g. Senior Consultant" value="Professional Title">
                </div>
                <div class="input-group">
                    <label for="input-email">Email Address</label>
                    <input type="email" id="input-email" placeholder="e.g. john@example.com">
                </div>
                <div class="input-group">
                    <label for="input-phone">Phone Number</label>
                    <input type="tel" id="input-phone" placeholder="e.g. +1 (555) 000-0000">
                </div>
                <div class="input-group">
                    <label for="input-website">Website / Portfolio</label>
                    <input type="url" id="input-website" placeholder="e.g. www.johndoe.com">
                </div>
            </div>
        </section>
        <section id="preview">
            <h2>Preview</h2>
            <div id="card-container">
                <div id="business-card" class="landscape minimal">
                    <div class="card-content">
                        <div class="card-text">
                            <h1 id="card-name-display">John Doe</h1>
                            <p id="card-title-display">Professional Title</p>
                        </div>
                        <div class="card-contact">
                            <p id="card-email-display"></p>
                            <p id="card-phone-display"></p>
                            <p id="card-website-display"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="js/app.js" type="module"></script>
</body>
</html>
